<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOCORD - AI Self-Learning Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div id="app">
        <!-- 사이드바 네비게이션 -->
        <aside class="sidebar">
            <div class="logo">BIOCORD AI</div>
            <nav>
                <ul>
                    <li class="nav-item active" data-tab="dashboard">
                        <span class="icon">📅</span> 대시보드
                    </li>
                    <li class="nav-item" data-tab="timetable">
                        <span class="icon">⏰</span> 고정 시간표
                    </li>
                    <li class="nav-item" data-tab="goals">
                        <span class="icon">🎯</span> 학습 목표
                    </li>
                    <li class="nav-item" data-tab="settings">
                        <span class="icon">⚙️</span> 설정 (API)
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- 메인 콘텐츠 영역 -->
        <main class="content">
            <!-- 탭 1: 대시보드 (주간 캘린더) -->
            <section id="dashboard" class="tab-content active">
                <header>
                    <h1>학습 대시보드</h1>
                    <button id="generate-ai-btn" class="primary-btn">AI 추천 스케줄 생성</button>
                </header>
                <div class="calendar-container">
                    <div class="calendar-grid" id="calendar-grid">
                        <!-- JS에서 시간표 그리드 생성 예정 -->
                    </div>
                </div>
            </section>

            <!-- 탭 2: 고정 시간표 설정 -->
            <section id="timetable" class="tab-content">
                <header>
                    <h1>고정 시간표 설정</h1>
                    <p>수업, 식사 등 매주 반복되는 고정 일정을 입력하세요.</p>
                </header>
                <div class="form-card">
                    <form id="timetable-form">
                        <input type="text" id="event-name" placeholder="일정 이름 (예: 자료구조 강의)" required>
                        <div class="form-row">
                            <select id="event-day" required>
                                <option value="1">월요일</option>
                                <option value="2">화요일</option>
                                <option value="3">수요일</option>
                                <option value="4">목요일</option>
                                <option value="5">금요일</option>
                                <option value="6">토요일</option>
                                <option value="0">일요일</option>
                            </select>
                            <input type="time" id="event-start" required>
                            <input type="time" id="event-end" required>
                        </div>
                        <button type="submit" class="secondary-btn">일정 추가</button>
                    </form>
                </div>
                <div id="event-list" class="list-container">
                    <!-- 저장된 일정 목록 표시 -->
                </div>
            </section>

            <!-- 탭 3: 학습 목표 설정 -->
            <section id="goals" class="tab-content">
                <header>
                    <h1>학습 목표 설정</h1>
                    <p>AI가 계획을 짤 때 반영할 오늘의 학습 목표입니다.</p>
                </header>
                <div class="form-card">
                    <div class="form-group">
                        <label>하루 목표 학습 시간 (시간)</label>
                        <input type="number" id="target-hours" min="1" max="24" value="4">
                    </div>
                    <div class="form-group">
                        <label>집중 학습 과목 (쉼표로 구분)</label>
                        <input type="text" id="target-subjects" placeholder="알고리즘, 리액트, 영어회화">
                    </div>
                    <button id="save-goals-btn" class="secondary-btn">목표 저장</button>
                </div>
            </section>

            <!-- 탭 4: 설정 (API 키) -->
            <section id="settings" class="tab-content">
                <header>
                    <h1>설정</h1>
                </header>
                <div class="form-card">
                    <div class="form-group">
                        <label>Gemini API Key</label>
                        <input type="password" id="api-key" placeholder="API 키를 입력하세요">
                        <p class="hint">키는 브라우저 로컬 저장소에만 안전하게 보관됩니다.</p>
                    </div>
                    <button id="save-settings-btn" class="secondary-btn">설정 저장</button>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
